name: Deploy hosted replay

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - uses: actions/configure-pages@v6

      - name: Install frontend dependencies
        run: npm --prefix apps/web ci

      - name: Verify recorded replay evidence
        run: python scripts/verify-replay.py

      - name: Build credential-free hosted replay
        env:
          VITE_FORCE_REPLAY: "true"
          VITE_BASE_PATH: "/datarescue/"
        run: npm --prefix apps/web run build

      - name: Package replay evidence and SPA fallback
        run: |
          mkdir -p apps/web/dist/replay
          cp -R demo/replay/. apps/web/dist/replay/
          cp apps/web/dist/index.html apps/web/dist/404.html
          if grep -E '((src|href)="/assets/)' apps/web/dist/index.html; then
            echo "Pages build contains root-relative assets; honor VITE_BASE_PATH." >&2
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v5
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
