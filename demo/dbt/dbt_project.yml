name: datarescue_demo
version: 1.0.0
config-version: 2

profile: datarescue_demo

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages

models:
  datarescue_demo:
    +persist_docs:
      relation: true
      columns: true
    staging:
      +materialized: view
    marts:
      +materialized: table

vars:
  source_revenue_semantics: recognized_merchant_revenue_after_processing_fees
